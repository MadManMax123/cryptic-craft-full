<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NULL // Access Denied</title>
<link rel="icon" type="image/png" href="11zon_cropped.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #04050a;
  --border: rgba(120,160,255,.12);
  --border-strong: rgba(120,160,255,.26);
  --text: #edf2ff;
  --muted: #8090b8;
  --danger: #ff8a9a;
  --shadow: 0 28px 90px rgba(0,0,0,.55);
  --radius-xl: 24px;
  --font-body: 'Space Grotesk', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --font-display: 'Syne', sans-serif;
}

html, body { min-height: 100%; }

body {
  min-height: 100vh;
  padding: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  background:
    radial-gradient(circle at top, rgba(95,240,255,.06), transparent 28%),
    radial-gradient(circle at 20% 20%, rgba(152,184,255,.08), transparent 22%),
    linear-gradient(180deg, #06070d 0%, #04050a 100%);
  color: var(--text);
  font-family: var(--font-body);
  user-select: none;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size: 32px 32px;
  opacity: .55;
  pointer-events: none;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, transparent 45%, rgba(0,0,0,.3) 100%);
  pointer-events: none;
}

.error-wrapper {
  position: relative;
  z-index: 1;
  width: min(620px, 94vw);
  text-align: center;
  padding: 40px 30px 32px;
  border-radius: var(--radius-xl);
  border: 1px solid rgba(255,138,154,.3);
  background: linear-gradient(180deg, rgba(20,10,14,.97), rgba(12,8,14,.99));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    0 0 60px rgba(255,138,154,.08),
    var(--shadow);
  backdrop-filter: blur(10px);
}
.error-wrapper::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(135deg, rgba(255,138,154,.05), transparent 28%, transparent 72%, rgba(255,100,120,.05));
}
.error-wrapper::after {
  content: "";
  position: absolute;
  top: 14px;
  left: 18px;
  right: 18px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,138,154,.42), transparent);
}

.error-tag {
  display: inline-block;
  margin-bottom: 12px;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,138,154,.22);
  background: rgba(255,138,154,.07);
  color: #ffb3be;
  font-family: var(--font-mono);
  font-size: .72rem;
  letter-spacing: .12em;
  text-transform: uppercase;
}

.error-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  display: block;
  filter: drop-shadow(0 0 12px rgba(255,138,154,.5));
}

.error-wrapper h1 {
  font-family: var(--font-display);
  font-size: clamp(1.2rem, 2vw, 1.6rem);
  letter-spacing: .16em;
  text-transform: uppercase;
  margin-bottom: 14px;
  color: #ffd4da;
}

.error-sub {
  font-size: .85rem;
  line-height: 1.7;
  color: var(--muted);
  margin-bottom: 24px;
  max-width: 50ch;
  margin-left: auto;
  margin-right: auto;
}

.error-details {
  font-family: var(--font-mono);
  font-size: .78rem;
  color: #c8a9b0;
  line-height: 1.6;
  margin-bottom: 24px;
  padding: 14px;
  border-radius: 8px;
  border-left: 2px solid var(--danger);
  background: rgba(255,138,154,.04);
  text-align: left;
}

.error-btn {
  display: inline-block;
  padding: 11px 28px;
  border-radius: 10px;
  border: 1px solid rgba(255,138,154,.28);
  background: rgba(255,138,154,.07);
  color: var(--danger);
  font-family: var(--font-mono);
  font-size: .8rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: .2s;
  text-decoration: none;
  display: inline-block;
}
.error-btn:hover {
  background: rgba(255,138,154,.14);
  box-shadow: 0 0 14px rgba(255,138,154,.15);
}

@media (max-width: 640px) {
  body { padding: 16px; }
  .error-wrapper { padding: 24px 18px 20px; border-radius: 18px; }
  .error-wrapper h1 { font-size: 1rem; letter-spacing: .12em; }
}
</style>
</head>
<body>

<div class="error-wrapper">
  <div style="position:relative;z-index:1;">
    <span class="error-icon">🔐</span>
    <div class="error-tag">Access Denied</div>
    <h1>Session Not Found</h1>
    <p class="error-sub">You do not have authorization to access this flag.</p>
    <div class="error-details">
      <div>// Session validation failed</div>
      <div>// Required: p17_session cookie with valid signature</div>
      <div>// Status: UNAUTHORIZED</div>
    </div>
    <a href="/" class="error-btn">Return to Challenge →</a>
  </div>
</div>

</body>
</html>
