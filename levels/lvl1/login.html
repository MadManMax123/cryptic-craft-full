<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OPERATION: NULL OVERRIDE — AUTHENTICATE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/png" href="11zon_cropped.png">
  <style>
    /* ── Login-page specific styles ── */
    body.login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
      background:
        radial-gradient(circle at top, rgba(152, 184, 255, 0.07), transparent 26%),
        radial-gradient(circle at 80% 80%, rgba(95, 240, 255, 0.05), transparent 22%),
        linear-gradient(180deg, #06070d 0%, #04050a 100%);
    }

    .login-wrapper {
      width: min(480px, 95vw);
      padding: 40px 32px 36px;
      border-radius: 24px;
      border: 1px solid rgba(120, 160, 255, 0.18);
      background:
        linear-gradient(180deg, rgba(14, 20, 36, 0.97), rgba(9, 12, 22, 0.99));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 0 80px rgba(95, 240, 255, 0.04),
        0 28px 90px rgba(0, 0, 0, 0.55);
      position: relative;
      overflow: hidden;
    }

    .login-wrapper::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(95, 240, 255, 0.04) 0%,
        transparent 35%,
        transparent 65%,
        rgba(152, 184, 255, 0.04) 100%
      );
      pointer-events: none;
    }

    /* Corner decorations */
    .login-wrapper::after {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 48px; height: 48px;
      border-top: 1px solid rgba(95, 240, 255, 0.3);
      border-left: 1px solid rgba(95, 240, 255, 0.3);
      pointer-events: none;
    }

    .corner-br {
      position: absolute;
      bottom: 0; right: 0;
      width: 48px; height: 48px;
      border-bottom: 1px solid rgba(152, 184, 255, 0.3);
      border-right: 1px solid rgba(152, 184, 255, 0.3);
      pointer-events: none;
    }

    .login-header {
      position: relative;
      z-index: 1;
      margin-bottom: 32px;
      text-align: center;
    }

    .login-eyebrow {
      display: block;
      margin-bottom: 8px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(95, 240, 255, 0.6);
    }

    .login-title {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 4vw, 1.85rem);
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      text-shadow: 0 0 28px rgba(152, 184, 255, 0.12);
      line-height: 1.15;
    }

    .login-title span {
      color: var(--accent2);
    }

    .login-divider {
      margin: 12px auto 0;
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(95, 240, 255, 0.5), transparent);
    }

    .login-form {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(128, 144, 184, 0.7);
    }

    .field-input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1px solid rgba(120, 160, 255, 0.14);
      background: rgba(6, 9, 16, 0.94);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.92rem;
      outline: none;
      transition:
        border-color 0.2s ease,
        box-shadow 0.2s ease;
    }

    .field-input::placeholder {
      color: rgba(128, 144, 184, 0.35);
    }

    .field-input:focus {
      border-color: rgba(95, 240, 255, 0.4);
      box-shadow:
        0 0 0 3px rgba(95, 240, 255, 0.06),
        0 0 20px rgba(95, 240, 255, 0.06);
    }

    .login-btn {
      margin-top: 8px;
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid rgba(95, 240, 255, 0.3);
      background: linear-gradient(180deg,
        rgba(95, 240, 255, 0.13),
        rgba(152, 184, 255, 0.10)
      );
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        border-color 0.18s ease,
        opacity 0.18s ease;
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(95, 240, 255, 0.5);
      box-shadow: 0 12px 28px rgba(95, 240, 255, 0.1);
    }

    .login-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .login-status {
      margin-top: 4px;
      min-height: 1.4em;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
    }

    .login-status.error { color: var(--danger); }
    .login-status.ok    { color: var(--good); }
    .login-status.info  { color: var(--muted); }

    /* Scanning line animation on the wrapper */
    @keyframes scanLine {
      0%   { top: -2px; opacity: 0; }
      5%   { opacity: 0.5; }
      95%  { opacity: 0.5; }
      100% { top: calc(100% + 2px); opacity: 0; }
    }

    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(95, 240, 255, 0.35), transparent);
      pointer-events: none;
      z-index: 2;
      animation: scanLine 4s linear infinite;
    }

    /* Status dot blink */
    .status-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent2);
      margin-right: 6px;
      vertical-align: middle;
      animation: dotBlink 1.8s ease-in-out infinite;
    }

    @keyframes dotBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .login-footer {
      position: relative;
      z-index: 1;
      margin-top: 24px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: rgba(128, 144, 184, 0.3);
      letter-spacing: 0.08em;
      user-select: none;
    }

    /* loading spinner */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 1.5px solid rgba(95, 240, 255, 0.3);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="scan-line"></div>
    <div class="corner-br"></div>

    <div class="login-header">
      <span class="login-eyebrow"><span class="status-dot"></span>null override — secure channel</span>
      <h1 class="login-title">TEAM<br><span>AUTHENTICATE</span></h1>
      <div class="login-divider"></div>
    </div>

    <div class="login-form">
      <div class="field-group">
        <label class="field-label" for="team-id-input">Team ID</label>
        <input
          id="team-id-input"
          class="field-input"
          type="text"
          autocomplete="username"
          spellcheck="false"
          autocorrect="off"
          autocapitalize="none"
          placeholder="team_identifier"
        />
      </div>

      <div class="field-group">
        <label class="field-label" for="password-input">Access Key</label>
        <input
          id="password-input"
          class="field-input"
          type="password"
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </div>

      <button id="login-btn" class="login-btn" type="button">
        Authenticate
      </button>

      <div id="login-status" class="login-status info"></div>
    </div>

    <div class="login-footer">
      NULL // UNAUTHORISED ACCESS IS LOGGED
    </div>
  </div>

  <script>
    // Disable right-click (match existing pages)
    document.addEventListener("contextmenu", e => e.preventDefault());

    document.addEventListener("DOMContentLoaded", () => {
      const teamInput = document.getElementById("team-id-input");
      const passInput = document.getElementById("password-input");
      const btn       = document.getElementById("login-btn");
      const status    = document.getElementById("login-status");

      function setStatus(msg, type = "info") {
        status.className = `login-status ${type}`;
        status.innerHTML = msg;
      }

      async function doLogin() {
        const teamId   = teamInput.value.trim().toLowerCase();
        const password = passInput.value.trim();

        if (!teamId || !password) {
          setStatus("all fields required", "error");
          return;
        }

        btn.disabled = true;
        setStatus('<span class="spinner"></span>authenticating...', "info");

        try {
          const res  = await fetch("/api/login", {
            method:      "POST",
            credentials: "same-origin",
            headers:     { "Content-Type": "application/json" },
            body:        JSON.stringify({ team_id: teamId, password }),
          });

          const data = await res.json();

          if (res.ok && data.ok) {
            setStatus("access granted — redirecting...", "ok");
            setTimeout(() => {
              window.location.href = "/index.html";
            }, 700);
          } else {
            setStatus(data.error ?? "invalid credentials", "error");
            btn.disabled = false;
            passInput.value = "";
            passInput.focus();
          }
        } catch (err) {
          console.error(err);
          setStatus("server unreachable", "error");
          btn.disabled = false;
        }
      }

      btn.addEventListener("click", doLogin);
      [teamInput, passInput].forEach(el =>
        el.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); })
      );

      // Auto-focus team ID field
      teamInput.focus();
    });
  </script>
</body>
</html>
